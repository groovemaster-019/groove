<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050608">
<link rel="apple-touch-icon" href="logo.PNG">
<title>GROOVE COLLECTIVE RADIO — Soul. Funk. 019 Hood. G-Funk.</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Mr+Dafoe&family=Montserrat:wght@400;500;600;700&family=Pirata+One&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#050608; --panel:#0C0E14; --card:#11141C; --card2:#141822;
  --line:#1C2230; --line2:#1E3A6A; --blue:#3B82F6; --deep:#1E3A8A;
  --ice:#E6EEF9; --muted:#A3B1C6; --dim:#5B6B85;
  --gold:#C9A24B;
  --neon:#EC4899; --neon2:#A855F7;
}

html, body {
  height: 100%;
  background: var(--bg); color: var(--ice);
  font-family: 'Montserrat', sans-serif;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

.app { display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

/* ── HEADER ── */
.brand-logo {
  font-family:'Mr Dafoe', cursive; font-weight:400;
  font-size:34px; line-height:1; letter-spacing:.5px;
  color:#fff5fb;
  animation:flicker 5s ease-in-out infinite;
}
@keyframes flicker {
  /* 通常点灯：白い芯 → ピンク → マゼンタ → 紫 の多層グロー */
  0%, 17%, 23%, 44%, 62%, 80%, 100% {
    opacity:1;
    text-shadow:
      0 0 2px #fff,
      0 0 6px #fff,
      0 0 12px #FF9ED8,
      0 0 22px #EC4899,
      0 0 40px #D6409A,
      0 0 66px #A855F7,
      0 0 96px #7C3AED;
  }
  /* バチッと一瞬だけ沈む（上品に控えめ）*/
  19%, 20%, 63%, 64% {
    opacity:.55;
    text-shadow:
      0 0 2px #fff,
      0 0 8px #FF9ED8,
      0 0 18px #EC4899;
  }
  43% {
    opacity:.7;
    text-shadow:
      0 0 2px #fff,
      0 0 10px #EC4899,
      0 0 26px #A855F7;
  }
}
/* ── PAGES ── */
.content { flex:1; overflow:hidden; position:relative; }
.page { position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; padding-bottom:14px; }
.page.active { display:block; }

/* ── HERO ── */
.hero {
  padding:max(54px, calc(env(safe-area-inset-top) + 40px)) 20px 24px;
  position:sticky; top:0; z-index:20; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; inset:0; z-index:0;
  background-image:url('https://images.unsplash.com/photo-1625806638987-35c560d4ca6e?fm=jpg&q=70&w=1200&auto=format&fit=crop');
  background-size:cover; background-position:center;
}
/* 文字を読みやすくする暗いフィルター（上端と下端を背景になじませる）*/
.hero::after {
  content:''; position:absolute; inset:0; z-index:1;
  background:linear-gradient(90deg, rgba(5,6,8,.92) 0%, rgba(5,6,8,.72) 45%, rgba(5,6,8,.45) 100%),
             linear-gradient(180deg, #050608 0%, rgba(5,6,8,.55) 14%, transparent 38%, transparent 62%, rgba(5,6,8,.92) 100%);
}
.hero > * { position:relative; z-index:2; }
/* シルバーのメタリック調 */
/* ヒーローの特大ネオンロゴ（横長1行・斜め）*/
.hero-neon {
  font-size:40px !important;
  line-height:1.1 !important;
  white-space:nowrap;
  text-align:center;
  margin:24px 0 18px;
  display:block;
  transform:rotate(-5deg);
  transform-origin:center;
}

/* ── NOW ON AIR ── */
.eyebrow {
  font-size:11px; letter-spacing:3px; color:var(--ice); text-transform:uppercase; font-weight:700;
  display:flex; align-items:center; gap:9px;
}
.eyebrow::before {
  content:''; width:18px; height:2px; border-radius:2px; flex-shrink:0;
  background:linear-gradient(90deg, var(--neon), var(--neon2));
  box-shadow:0 0 8px rgba(236,72,153,.55);
}
@keyframes eqbar { from{height:4px;opacity:.5} to{height:24px;opacity:1} }

/* ── SECTION HEADERS ── */
.sec-head { display:flex; justify-content:space-between; align-items:center; padding:24px 20px 0; }
.sec-link { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; font-weight:600; cursor:pointer; }

/* 文字を読みやすくする下からの影 */

/* 記事一覧（Notesページ）*/
.note-row {
  padding:16px 20px; border-bottom:1px solid var(--line);
  cursor:pointer; user-select:none; position:relative;
}
.note-row:active { background:var(--card); }
.note-row::before {
  content:''; position:absolute; left:8px; top:18px; bottom:18px; width:2px; border-radius:2px;
  background:linear-gradient(180deg, var(--neon), var(--neon2));
  opacity:.85;
}
.note-row-tag { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; font-weight:700;
  background:linear-gradient(90deg, var(--neon), var(--neon2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.note-row-title { font-family:'Anton',sans-serif; font-size:18px; line-height:1.1; margin-top:6px; color:var(--ice); }
.note-row-teaser { font-size:11px; line-height:1.6; color:var(--muted); margin-top:6px; }

/* ── Today's Playlist ── */
.pl-row {
  display:flex; align-items:center; gap:12px;
  padding:9px 20px; cursor:pointer; user-select:none;
}
.pl-row:active { background:var(--card); }
.pl-row.playing { background:rgba(59,130,246,.12); }
.pl-num { width:20px; text-align:center; font-size:12px; color:var(--muted); font-weight:700; flex-shrink:0; }
.pl-art {
  width:46px; height:46px; border-radius:8px; flex-shrink:0;
  background:var(--card); overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.pl-art img { width:100%; height:100%; object-fit:cover; }
.pl-meta { flex:1; min-width:0; }
.pl-name { font-size:13px; font-weight:600; color:var(--ice); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pl-artist { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

/* ── Live Radio ── */
.radio-genres { display:flex; gap:8px; overflow-x:auto; padding:4px 20px 14px; scrollbar-width:none; }
.radio-genres::-webkit-scrollbar { display:none; }
.radio-genre-pill {
  flex-shrink:0; padding:8px 16px; border-radius:20px; cursor:pointer; user-select:none;
  background:var(--card); border:1px solid var(--line); color:var(--muted);
  font-size:12px; font-weight:700; letter-spacing:.5px; white-space:nowrap;
}
.radio-genre-pill.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.radio-row {
  display:flex; align-items:center; gap:12px;
  padding:11px 20px; cursor:pointer; user-select:none;
  border-bottom:1px solid var(--line);
}
.radio-row:active { background:var(--card); }
.radio-row.playing { background:rgba(59,130,246,.12); }
.radio-ico {
  width:44px; height:44px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(135deg, #1e2a3f, #0d1420);
  display:flex; align-items:center; justify-content:center; font-size:20px;
  overflow:hidden; position:relative;
}
.radio-ico img { width:100%; height:100%; object-fit:cover; }
.radio-meta { flex:1; min-width:0; }
.radio-name { font-size:13px; font-weight:600; color:var(--ice); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.radio-sub { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.radio-live {
  font-size:9px; font-weight:700; letter-spacing:1px; color:#fff;
  background:linear-gradient(135deg, #ef4444, #dc2626); padding:2px 7px; border-radius:4px; flex-shrink:0;
  box-shadow:0 0 10px rgba(239,68,68,.45);
}
.radio-row.playing .radio-live { background:var(--blue); }
.radio-loading, .radio-empty { padding:24px 20px; text-align:center; color:var(--muted); font-size:12px; line-height:1.7; }

/* ── プレイリスト管理画面 ── */
/* 記事モーダル */
.col-modal {
  position:fixed; inset:0; z-index:120;
  background:rgba(5,6,8,.6); backdrop-filter:blur(4px);
  display:none; align-items:flex-end;
}
.col-modal.open { display:flex; }
.col-sheet {
  width:100%; max-height:82vh; overflow-y:auto;
  background:linear-gradient(180deg, #0E1422, var(--bg) 40%);
  border-top-left-radius:20px; border-top-right-radius:20px;
  border-top:1px solid var(--line);
  padding:20px 22px max(28px, env(safe-area-inset-bottom));
}
.col-sheet-bar { width:36px; height:4px; background:var(--line); border-radius:2px; margin:0 auto 16px; }
.col-sheet-tag { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; font-weight:700;
  background:linear-gradient(90deg, var(--neon), var(--neon2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.col-sheet-title { font-family:'Anton',sans-serif; font-size:26px; line-height:1.05; margin-top:8px; }
.col-sheet-body { font-size:13px; line-height:1.85; color:var(--ice); margin-top:14px; white-space:pre-line; }

/* ── Deep Dive 記事ブロック ── */
.dd-text { white-space:pre-line; margin-bottom:14px; font-size:13px; line-height:1.85; color:var(--ice); }
.dd-head { font-family:'Anton',sans-serif; font-size:17px; letter-spacing:1px; color:var(--blue); margin:20px 0 10px; }
.dd-image { margin:16px 0; }
.dd-image img { width:100%; border-radius:12px; display:block; }
.dd-caption { font-size:10px; color:var(--muted); margin-top:6px; text-align:center; letter-spacing:.5px; }
.dd-video { margin:16px 0; }
.dd-video iframe, .dd-video video { width:100%; aspect-ratio:16/9; border-radius:12px; display:block; background:#000; border:none; }
.dd-video video { aspect-ratio:auto; max-height:70vh; }
.dd-lyric {
  margin:14px 0; padding:14px 16px; border-radius:12px;
  background:linear-gradient(150deg, #141A28, #0A0E16);
  border:1px solid var(--line); border-left:3px solid var(--blue);
}
.dd-lyric-orig { font-size:14px; font-weight:600; color:var(--ice); line-height:1.5; font-style:italic; }
.dd-lyric-tran { font-size:13px; color:#9fbfff; line-height:1.7; margin-top:8px; white-space:pre-line; }
.dd-lyric-note { font-size:11px; color:var(--muted); line-height:1.6; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }
.col-sheet-close {
  margin-top:18px; width:100%; padding:13px; background:var(--card);
  border:1px solid var(--line); border-radius:10px; color:var(--muted);
  font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer;
  font-family:'Montserrat',sans-serif;
}

/* ── FEATURED VIDEO ── */

/* ── GENRE PILLS ── */

/* ── SECTION ── */
.section-title-row { display:flex; justify-content:space-between; align-items:baseline; padding:18px 20px 10px; }
.section-title {
  font-family:'Anton',sans-serif; font-size:22px; letter-spacing:2px;
  display:flex; align-items:center; gap:11px;
}
.section-title::before {
  content:''; width:22px; height:3px; border-radius:2px; flex-shrink:0;
  background:linear-gradient(90deg, var(--neon), var(--neon2));
  box-shadow:0 0 10px rgba(236,72,153,.5);
}

/* ── TRACK ROWS ── */
.track-row {
  display:flex; align-items:center; gap:12px;
  padding:11px 20px; cursor:pointer;
  transition:background .15s; user-select:none;
}
.track-row:active { background:var(--card); }
.track-row.now { background:rgba(59,130,246,.10); border-left:3px solid var(--blue); padding-left:17px; }
.track-row.now .t-name { color:var(--blue); }
.t-art {
  width:50px; height:50px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0; position:relative;
  background-size:cover; background-position:center;
  border:1px solid var(--line);
}
.t-art.has-img { font-size:0; }
.t-playing-icon { position:absolute; inset:0; border-radius:6px; background:rgba(7,13,26,.55); display:none; align-items:center; justify-content:center; }
.track-row.now .t-playing-icon { display:flex; }
.t-eq { display:flex; align-items:flex-end; gap:2px; height:16px; }
.t-eq span { width:3px; border-radius:1px; background:var(--blue); height:4px; }
.playing-anim .t-eq span { animation:eq .7s ease-in-out infinite alternate; }
.t-eq span:nth-child(2){animation-delay:.15s}
.t-eq span:nth-child(3){animation-delay:.07s}
@keyframes eq { from{height:4px;opacity:.5} to{height:14px;opacity:1} }
.t-info { flex:1; min-width:0; }
.t-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-artist { font-size:11px; color:var(--muted); margin-top:2px; }
.t-genre-tag {
  font-size:8px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:4px 8px; border-radius:4px;
  background:var(--card); color:var(--blue); flex-shrink:0;
  border:1px solid var(--line);
}
.fav-btn {
  background:none; border:none; font-size:19px;
  color:var(--dim); cursor:pointer; flex-shrink:0;
  min-width:42px; min-height:42px;
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, color .15s;
}
.fav-btn.faved { color:var(--blue); }
.fav-btn:active { transform:scale(1.25); }

.empty-msg { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; line-height:1.9; }

/* ── SEARCH ── */
.search-wrap { padding:16px 20px 4px; }
.search-input {
  width:100%; padding:13px 16px;
  background:var(--panel); border:1px solid var(--line);
  border-radius:8px; color:var(--ice);
  font-size:15px; font-family:'Montserrat',sans-serif;
  outline:none;
}
.search-input:focus { border-color:var(--blue); }
.search-input::placeholder { color:var(--dim); }

/* ── MINI PLAYER ── */
.mini {
  flex-shrink:0; background:var(--panel);
  border-top:1px solid var(--line);
  padding:10px 16px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer; position:relative;
}
.mini-prog { position:absolute; top:0; left:0; right:0; height:2px; background:var(--line); }
.mini-prog-fill { height:100%; background:var(--blue); width:0%; }
.mini-art {
  width:42px; height:42px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
  background-color:var(--card);
  border:1px solid var(--line); overflow:hidden;
}
.mini-art img { width:100%; height:100%; object-fit:contain; display:block; }
.mini-art.has-img { font-size:0; }
.mini-info { flex:1; min-width:0; }
.mini-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-artist { font-size:11px; color:var(--blue); margin-top:2px; }
.mini-btn {
  width:44px; height:44px; background:var(--blue); border-radius:50%;
  border:none; color:#fff; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; cursor:pointer;
  box-shadow:0 0 16px rgba(59,130,246,.45);
}
.mini-btn:active { transform:scale(.92); }

/* ── NAV ── */
.nav {
  flex-shrink:0; background:#070A10;
  border-top:1px solid var(--line);
  display:flex;
  padding-bottom:max(8px, env(safe-area-inset-bottom));
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:10px 4px 6px; border:none; background:none;
  color:var(--dim); min-height:56px; cursor:pointer;
  transition:color .15s; user-select:none;
}
.nav-btn.active { color:var(--blue); }
.nav-icon { font-size:19px; line-height:1; }
.nav-txt { font-size:8px; letter-spacing:1px; text-transform:uppercase; font-weight:700; }

/* ── PLAYER SHEET ── */
.sheet {
  position:fixed; inset:0; z-index:100;
  background:linear-gradient(180deg, #0E1422 0%, var(--bg) 45%);
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.32,.72,0,1);
  display:flex; flex-direction:column;
  padding-top:max(16px, env(safe-area-inset-top));
  padding-bottom:max(16px, env(safe-area-inset-bottom));
  overflow-y:auto;
}
.sheet.open { transform:translateY(0); }
.drag-bar { width:36px; height:4px; background:var(--line); border-radius:2px; margin:0 auto 16px; flex-shrink:0; cursor:pointer; }
.sheet-top { display:flex; align-items:center; justify-content:space-between; padding:0 20px 14px; flex-shrink:0; }
.sheet-station { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--blue); font-weight:700; }
.sheet-close {
  background:var(--card); border:1px solid var(--line); color:var(--muted);
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer;
}

/* ── ALBUM COVER (大ジャケット) ── */
.cover-wrap {
  width:min(78vw, 320px); aspect-ratio:1/1; margin:0 auto;
  border-radius:18px; overflow:hidden; position:relative; flex-shrink:0;
  background:linear-gradient(145deg, #1a2030, #0a0d14);
  box-shadow:
    0 24px 60px rgba(0,0,0,.6),
    0 6px 70px rgba(236,72,153,.10),
    0 -4px 60px rgba(168,85,247,.08),
    0 0 0 1px rgba(255,255,255,.06) inset;
}
.cover-img { width:100%; height:100%; object-fit:cover; display:none; }
.cover-wrap.has-img .cover-img { display:block; }
.cover-fallback {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Anton',sans-serif; font-size:64px; color:rgba(255,255,255,.14); letter-spacing:2px;
}
.cover-wrap.has-img .cover-fallback { display:none; }

/* ジャケット画像を円盤全面に */
/* ディスクの虹色レインボー反射＋細い溝 */
/* 回転中のモーションブラー */

/* ディスク投入（上から落ちてセット＆バウンド）*/
/* スピンアップ（ゆっくり→高速へ加速）*/

/* 再生中：ジャケット静止＋ゆっくり呼吸する発光＋光沢が走る */
/* 光沢の帯が斜めに走る */
@keyframes disc-shine {
  0%   { transform:translateX(-30%) rotate(0deg); opacity:0; }
  18%  { opacity:1; }
  40%  { transform:translateX(30%) rotate(0deg); opacity:0; }
  100% { transform:translateX(30%) rotate(0deg); opacity:0; }
}

/* ── ポータブルCDプレイヤー筐体 ── */
/* 筐体のヘアライン質感 */
/* CD本体（筐体の中で回る）*/
/* 中央：爪付きスピンドル */
/* 中央：爪でCDを掴むハブ */
/* 3つの爪（CDを外周方向に押さえる）*/
/* 中央の軸ピン */

/* ── リアルなガラスカバー（覗き窓）── */
/* ガラス全面のうっすら反射＋窓の上下フチ */
/* ガラスの斜め反射ハイライト（写真のような大きな光の帯）*/

/* テキストラベル（画像が無いとき用）*/
/* ── 液晶ディスプレイパネル ── */
.player-body {
  width:248px; margin:0 auto 22px;
  display:flex; flex-direction:column; align-items:center;
}
/* 青く光る液晶画面 */
/* 液晶のドット網点 */
/* ボリュームダイヤル */

.sheet-info { text-align:center; padding:0 24px 16px; flex-shrink:0; }
.sheet-title { font-family:'Anton',sans-serif; font-size:28px; letter-spacing:2px; }
.sheet-artist { font-size:12px; color:var(--blue); letter-spacing:2px; font-weight:600; text-transform:uppercase; margin-top:2px; }
.preview-tag { font-size:10px; color:var(--muted); margin-top:8px; }
.sheet-eq { display:flex; align-items:flex-end; justify-content:center; gap:4px; height:22px; margin-top:12px; }
.sheet-eq span { width:3px; border-radius:2px; background:var(--blue); opacity:.8; height:4px; }
.playing-anim .sheet-eq span { animation:eq .7s ease-in-out infinite alternate; }
.sheet-eq span:nth-child(2){animation-delay:.1s}
.sheet-eq span:nth-child(3){animation-delay:.05s}
.sheet-eq span:nth-child(4){animation-delay:.18s}
.sheet-eq span:nth-child(5){animation-delay:.08s}
.sheet-eq span:nth-child(6){animation-delay:.22s}
.sheet-eq span:nth-child(7){animation-delay:.02s}

.prog-section { padding:0 24px 12px; flex-shrink:0; }
.prog-bar { height:20px; display:flex; align-items:center; cursor:pointer; }
.prog-track { width:100%; height:4px; background:var(--line); border-radius:2px; position:relative; }
.prog-fill { height:100%; background:var(--blue); border-radius:2px; width:0%; position:relative; }
.prog-fill::after { content:''; position:absolute; right:-7px; top:-5px; width:14px; height:14px; border-radius:50%; background:#fff; box-shadow:0 0 8px rgba(59,130,246,.8); }
.prog-times { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:4px; }

.ctrls { display:flex; align-items:center; justify-content:center; gap:18px; padding:6px 24px 16px; flex-shrink:0; }
.c-btn {
  background:none; border:none; color:var(--muted); font-size:22px;
  cursor:pointer; min-width:48px; min-height:48px;
  display:flex; align-items:center; justify-content:center;
  transition:color .15s;
}
.c-btn.on { color:var(--blue); }
.c-btn:active { transform:scale(.9); }
.c-main {
  width:68px; height:68px; background:linear-gradient(145deg, #4C8DF8, #2563EB); border-radius:50%;
  border:none; color:#fff; font-size:24px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 26px rgba(37,99,235,.45), 0 0 44px rgba(59,130,246,.28), inset 0 1px 0 rgba(255,255,255,.22);
  transition:transform .12s;
}
.c-main:active { transform:scale(.92); }

.q-section { padding:0 20px 20px; }
.q-title { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--blue); font-weight:700; margin-bottom:8px; }
.q-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); cursor:pointer; }
.q-row:last-child { border-bottom:none; }
.q-row.now .qr-name { color:var(--blue); }
.q-num { font-size:11px; color:var(--dim); width:18px; text-align:center; flex-shrink:0; }
.qr-info { flex:1; min-width:0; }
.qr-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.qr-artist { font-size:11px; color:var(--muted); margin-top:2px; }
.qr-dur { font-size:11px; color:var(--dim); }

/* ── GENRE COLORS（CDジュエルケース風）── */
.c-soul   { background:linear-gradient(150deg,#2A1B2E,#5B2C4F); }
.c-hiphop { background:linear-gradient(150deg,#0F2A4A,#1E5AA8); }

  text-shadow:0 0 10px rgba(236,72,153,.3), 0 0 22px rgba(168,85,247,.2);
}

];

var DEEPDIVE = [
  {"tag": "West Coast Deep Cut", "title": "DRESS CODE", "artist": "WC & The Maad Circle", "teaser": "1991年、Ice Cubeがエグゼクティブに就いたデビュー作。Coolioも在籍した南部LAの硬派クルーの一曲。", "blocks": [{"type": "text", "text": "1991年、Priority Recordsからリリースされたデビュー作『Ain't a Damn Thang Changed』収録。エグゼクティブ・プロデュースは、幼なじみで同郷のIce Cube。この一枚は、まだ売れる前のCoolio（後の“Gangsta's Paradise”）が在籍していたことでも知られる。"}, {"type": "head", "text": "MAADの意味"}, {"type": "text", "text": "グループ名の“Maad Circle”のMAADは、Minority Alliance of Anti-Discrimination（差別に抗するマイノリティ連合）の略。WC（William Calhoun Jr.）を中心に、Big Gee、DJ Crazy Toonesらで構成された。単なるギャングスタの誇示ではなく、南部LA〜コンプトンの労働者階級のリアル——ハッスル、家族の機能不全、地を這う日々——を生々しく描くのが持ち味だ。"}, {"type": "head", "text": "“Dress Code”というテーマ"}, {"type": "text", "text": "タイトルの“ドレスコード”は、クラブの服装規定を逆手にとった皮肉だ。高級クラブが「その格好じゃ入れない」とストリートの人間を締め出す——その線引きへの怒りと、俺たちには俺たちのコードがある、という反骨。着ているもので人を値踏みする社会構造そのものへの、West Sideからの返答になっている。"}, {"type": "head", "text": "その後の系譜"}, {"type": "text", "text": "WCはこの後グループを離れ、Ice Cube、Mack 10とスーパーグループWestside Connectionを結成する。つまりこの一枚は、90年代西海岸を象徴するあの連合の源流でもある。DJ Crazy ToonesはIce CubeのLench Mob Recordsで活動を続けた（2017年に急逝）。地味なデビュー作に見えて、West Coastの太い血脈がここから伸びていく。"}, {"type": "head", "text": "スラング早見"}, {"type": "text", "text": "dress code = クラブ等の服装規定（ここでは階級による締め出しの象徴）\nMAAD = Minority Alliance of Anti-Discrimination\nhustle = street で金を稼ぐこと\nthe West Side / West Up = 西海岸/ウェッサイの誇示\nloc = 仲間/いかれた奴（loco由来）\nfad = 流行り（“Caught n a Fad”＝流行に流される愚かさへの皮肉）"}]},
  {"tag": "West Coast Deep Cut", "title": "PULL YA HOE CARD", "artist": "Kam", "teaser": "Ice Cubeのいとこ、ワッツの政治的MC。CMT & E-A-Skiが手がけた1995年のG-Funkジェム。", "blocks": [{"type": "text", "text": "1995年のセカンド『Made in America』収録。プロデュースはベイエリアの名匠CMT & E-A-Ski。きらめくキー、渦巻くシンセ、けだるい女性ボーカルが乗った、まさに西海岸G-Funkの旨みが詰まった一曲だ。"}, {"type": "head", "text": "KAMという存在"}, {"type": "text", "text": "Kam（本名Craig Miller）はロサンゼルス・ワッツ出身。Ice Cubeのいとこにあたり、Lench Mob人脈から1993年に強烈なデビュー作『Neva Again』を放った。Nation of Islam（ルイス・ファラカン）の影響を色濃く受けた、カリフォルニア屈指の“毒を持つ”政治的リリシスト。ワッツ暴動、人種差別、社会的不平等を、ギャングスタのフォーマットの中で正面から斬る。"}, {"type": "head", "text": "“Hoe Card”とは"}, {"type": "text", "text": "“pull ya hoe card”は西海岸スラングで、「お前の化けの皮を剥ぐ」「本性を暴く」の意。hoe card＝その人物の弱さ・偽物ぶりを示す“札”を、pull（引き抜く）して衆目に晒す。この曲でKamは、フッド（地元）への忠誠と裏切り者への警告を、フロウの心地よさとは裏腹に鋭く突きつける。甘いG-Funkの上に硬派なメッセージ、という対比がKamの真骨頂だ。"}, {"type": "head", "text": "アルバムの布陣"}, {"type": "text", "text": "『Made in America』はDJ Quik、Warren G、DJ Battlecat、Above the LawのCold 187um、ベイのCMT & E-A-Skiと、西海岸プロデューサーのオールスターが集結した一枚。Roger Troutman的なトークボックス、うねるベース、ツイングなギター——カリフォルニアの空気そのものが鳴っている。Dresta、MC Renも客演。"}, {"type": "head", "text": "スラング早見"}, {"type": "text", "text": "pull ya hoe card = 化けの皮を剥ぐ/本性を暴く\nhoe card = 偽物・弱さを示す“札”\nfar (fa) mine / down fa mine = 自分の仲間・信条のために貫く\nthe hood = 地元/ブロック\nrepresent = 地元や信条を体現・代表する\nNation = Nation of Islam(Kamの思想的背景)"}]},
  {"tag": "West Coast Deep Cut", "title": "EAST SIDE RENDEZVOUS", "artist": "Kid Frost (Frost) feat. A.L.T. & O.G. Enius", "teaser": "チカーノ・ラップの父。イーストLAの帝王が1995年、Ruthless期に放ったローライダー・アンセム。", "blocks": [{"type": "text", "text": "1995年のアルバム『Smile Now, Die Later』のリードシングル。この時期、彼は「Kid Frost」から「Frost」へと改名し、Eazy-EのRuthless Recordsと契約していた。プロデュースはMonte Carlo、A.L.T.とO.G. Enius、そして歌手Diane Gordonが参加。ソウルフルなボーカルが乗った、スムースでアッパーなライドチューンだ。"}, {"type": "head", "text": "チカーノ・ラップの父"}, {"type": "text", "text": "Kid Frost（本名Arturo Molina Jr.）はイーストLA育ちのメキシカン・アメリカン。ラップ名は、彼がよくバトルしていたIce-Tへのオマージュだ。1990年の“La Raza”はチカーノ・ヒップホップの世界的アンセムとなり、彼は“Godfather of Chicano Rap”と呼ばれる。オールディーズやローライダー・クルージングの名曲をサンプリングし、Spanglish（英語とスペイン語の混成）で韻を踏むスタイルを確立。チカーノ文化を世界に広めた先駆者だ。"}, {"type": "head", "text": "“Rendezvous”の意味"}, {"type": "text", "text": "タイトルの“East Side Rendezvous”＝イーストサイドでの落ち合い/集い。rendezvous（ランデブー）はフランス語由来で「待ち合わせ」の意。バリオ（barrio＝メキシカン居住区）の仲間が集い、車を転がし、地元を祝福する——ギャングスタの緊張感よりも、コミュニティの誇りと結束を歌った一曲だ。硬派なイーストLAの空気と、祝祭的なグルーヴが同居している。"}, {"type": "head", "text": "スラング早見"}, {"type": "text", "text": "rendezvous = 落ち合い/集い(仏語由来)\nEast Side = イーストLA(チカーノ文化の中心地)\nbarrio = メキシカンの居住区/地元\nvato / homie = 仲間/兄弟(スペイン語スラング)\nfirme = イケてる/最高(チカーノ・スラング)\nlow-low = ローライダー(改造車)\nla raza = 同胞/我が民族"}]},
  {"tag": "West Coast Deep Cut", "title": "DIPPIN'", "artist": "King Tee", "teaser": "Xzibitを世に出したコンプトンの重鎮。The Four Topsを下敷きにした、夏の日曜の至上ライドチューン。", "blocks": [{"type": "text", "text": "1995年のアルバム『IV Life』(MCA Records)のリードシングル。Billboardのラップ・チャートで46位を記録した。The Four Topsの“Cherish”をサンプリングした、夏の日曜にキャデラックで街を流す至上のライドチューン。オリジナルに加え、Vic Cによる、うねるシンセとジャジーなホーンを効かせたG-Funkリミックスも名高い。"}, {"type": "head", "text": "KING TEEという重鎮"}, {"type": "text", "text": "King Tee（King T、本名Roger McBride）はコンプトン出身の西海岸のパイオニア。Likwit Crewの創設者であり、そのスタイルはIce CubeからThe Notorious B.I.G.まで影響を与えた、過小評価されがちな超一流リリシストだ。プロデューサーDJ Poohを世に出し、Tha AlkaholiksやXzibitを見出して育てた“兄貴分”でもある。80年代、Mixmaster Spadeの元にJ-Ro、Coolio、WCらと集った“Compton Posse”は、“6 N The Morning”や“Boyz N The Hood”以前のリアリティ・ラップの源流だった。"}, {"type": "head", "text": "“Dippin'”というライドの美学"}, {"type": "text", "text": "“dippin'”は西海岸スラングで、ローライダーで街をゆったり流すこと。King Teeはこの曲で、暑い日曜にキャデラックでコーナーを回り、スイッチ（油圧）を入れ、デイトン・リムを光らせながら流す情景を描く。暴力ではなく、クルージングそのものの快楽と誇り。West Coastの“ライド・ミュージック”の核心にある、あの気だるくも満ち足りた時間が封じ込められている。The Four Topsのソウルを下敷きにしている点も、まさにG-Funkの精神だ。"}, {"type": "head", "text": "スラング早見"}, {"type": "text", "text": "dippin' = ローライダーで街をゆったり流す\nhittin' switches = 油圧スイッチで車を上下させる\nDaytons / Dayton rims = デイトン社の高級ワイヤーホイール\nflossin' = 見せびらかす/羽振りよく振る舞う\nrider / rida = 車を流す者/信頼できる仲間\nthe Likwit Crew = King Teeらが率いた西海岸クルー"}]},
  { tag:'West Coast Deep Cut', title:'CAPS GET PEELED', artist:'DFC feat. MC Eiht',
    teaser:'フリント発、コンプトン経由。MC Eiht & DJ Slipを迎えた1994年のミッドウェスト×西海岸クラシック。',
    blocks:[{"type": "text", "text": "1994年3月22日、Big Beat/Atlantic Recordsからリリースされたアルバム『Things in tha Hood』の先行シングル。チャートではBillboard 200で71位、R&B/Hip-Hopアルバム・チャートで7位まで上昇した、DFC最大のヒットだ。"}, {"type": "head", "text": "\"Dope Flint Connection\""}, {"type": "text", "text": "DFCはミシガン州フリント出身。グループ名は\"Dope Flint Connection\"の略で、自分たちの街フリントの名を看板に背負っている。メンバーはAl BreedとT-Double（T-Trouble E）。Al Breedは、あのMC Breedのいとこにあたる。\n\n注目すべきは出自だ。フリントはデトロイト近郊、いわゆる西海岸でも南部でもないミッドウェスト（中西部）。DFCは独立系として中西部から出てきた最初期のグループの一つで、後に西海岸G-Funkサウンドへ接近していく。この曲はまさにその\"西への接近\"を象徴する一曲だ。"}, {"type": "head", "text": "コンプトンとの接続"}, {"type": "text", "text": "\"Caps Get Peeled\"を決定的にウェッサイ印にしているのが、客演とプロダクションだ。プロデュースは\bDJ SlipとMC Eiht——どちらもCompton's Most Wanted（CMW）の中心人物。そしてMC Eihtはマイクも握る。あの\"Geah!\"の合いの手と、淡々としているのに底冷えするフロウ。コンプトンの最も信頼されるストーリーテラーの一人が、フリントのグループに本物の西海岸の質感を持ち込んだ。\n\nつまりこの曲は、ミッドウェストのDFCとコンプトンのMC Eiht/DJ Slipが交差した地点に立っている。地理を超えてG-Funkが広がっていく、その瞬間のドキュメントだ。"}, {"type": "head", "text": "サンプリング"}, {"type": "text", "text": "ビートの土台にはMichael Hendersonの\"Let Me Love You\"（70年代ソウルの名曲）が使われている。甘いソウルを、ローライダーが転がるための重いファンクに変換する——G-Funkの王道の手口だ。タイトルの\"Caps Get Peeled\"自体が、前に解説したKnock on Woodの\"peel your cap back\"と同じ\"頭を撃ち抜く\"の意。94年の西海岸の空気がそのまま封じ込められている。"}, {"type": "head", "text": "何を歌っているのか"},{"type": "text", "text": "タイトルが示す通り、テーマは街の掟と暴力のリアリティだ。だが単なる物騒な自慢話ではない。DFCのAl BreedとT-Doubleは、フリントの厳しいブロックで生き抜く日常——敵への警告、信頼できる仲間との結束、油断すれば足をすくわれるストリートの緊張感——を淡々と、しかし誇りを持って描く。\n\nそこにMC Eihtが乗ると、視点が一段冷たくなる。コンプトンで彼が積み上げてきた\"観察者\"としての語り口。撃つ側の高揚ではなく、撃たれる現実を知っている者の落ち着き。フリントのハングリーさと、コンプトンの達観——二つの都市の声が同じビートの上で噛み合うことで、\"Caps Get Peeled\"は地名を超えたストリート讃歌になっている。"},{"type": "head", "text": "対訳で読む（抜粋）"},{"type": "text", "text": "全部は載せないが、効いているラインを抜き出して読む。Al Breedの、ゲットーのリアルと達観が滲むバースから。"},{"type": "lyric", "orig": "For the one you love to hate / On a mission to be 6 feet deep", "tran": "お前らが憎んでやまない、その存在として／墓場行き(6 feet deep)を覚悟して、任務についてる", "note": "\"6 feet deep\"=墓の深さ＝死。\"the one you love to hate\"＝嫌われ者を演じきる覚悟。Al Breedの、死を見据えた淡々とした語り。"},{"type": "lyric", "orig": "It's a shame the way them cards were dealt / They put us in the ghetto and said, \"Go for self\"", "tran": "配られたカードが悪かったってのは、悲しい現実だ／俺たちをゲットーに放り込んで「自分の力で生きろ」と言い放ったのさ", "note": "\"cards were dealt\"＝生まれの環境を配られたトランプに喩える定番表現。社会への静かな告発が滲む、この曲の核心。"},{"type": "lyric", "orig": "so many ways to pull another jack / pull the hammer back and peel another cap", "tran": "強奪(jack)を働くだけでも手はいくらでもある／撃鉄(hammer)を起こして、また一つ頭を撃ち抜く(peel a cap)", "note": "\"jack\"=強奪する、\"hammer\"=拳銃の撃鉄/銃そのもの、\"peel a cap\"=頭を撃ち抜く。タイトル\"Caps Get Peeled\"に直結する締めのライン。"},{"type": "head", "text": "アルバムの豪華さ"}, {"type": "text", "text": "親アルバム『Things in tha Hood』のゲスト陣も凄まじい。MC Eihtに加え、Warren G、Nate Dogg、Bushwick Bill（Geto Boys）、そしていとこのMC Breed。Gファンク全盛期の西海岸人脈が、フリント発のアルバムに集結している。ミッドウェストの独立系グループがここまでの布陣を組めたこと自体が、DFCの実力と人脈の証だ。"}, {"type": "text", "text": "盛岡もフリントも、ラップの\"中心地\"ではない。それでも本物を鳴らせば、街の名前ごと刻まれる。DFCが\"Dope Flint Connection\"を名乗ったように、土地の名を背負って音を出すことの強さを、この曲は教えてくれる。"},{"type": "head", "text": "スラング早見"},{"type": "text", "text": "cap = 頭（caps get peeled＝頭が撃ち抜かれる）\npeel = 撃つ/撃ち抜く\nGeah! = MC Eihtの代名詞的な合いの手（イェー/そうだ）\nhood = 地元/ブロック\nthe Connection = 繋がり/結束（DFC＝Dope Flint Connection）\ncreep = 気配を消して動く\nbuster = 腰抜け/ニセモノ\nslippin' = 油断する\nG-funk = Pファンクを下敷きにした重く滑らかな西海岸サウンド"}] },
  { tag:'West Coast Deep Cut', title:'KNOCK ON WOOD', artist:"Sh'killa & Gripsta (Murder Squad)",
    teaser:'1995年S.C.C.のコンピが生んだ、女性ギャングスタMC二人の名バース。スラング解説付きで対訳。',
    blocks:[{"type": "text", "text": "1995年2月14日リリース、South Central Cartel率いる西海岸オールスター・コンピ『S.C.C. Presents Murder Squad Nationwide』(G.W.K./Def Jam)収録。プロデュースはS.C.C.のProdeje、フックを歌うのは“Gangsta's Paradise”のあのL.V.。この曲のバースを蹴るのが、Sh'killaとGripstaという二人の女性ギャングスタMCだ。"}, {"type": "head", "text": "GRIPSTAという存在"}, {"type": "text", "text": "Gripsta（本名Brandi Younger）はオークランド出身。なんと13歳でIce-Tに見出され、14歳でIce-Tの1993年作『Home Invasion』の\"Funky Gripsta\"でデビューした、最年少クラスの女性ギャングスタラッパーだ。媚びず、女を売りにせず、Ice-T仕込みの\"政治的な本気さ\"とオークランドの路上のリアルだけで勝負した。男社会のウェッサイに、スキルだけでねじ込んだ存在だ。"}, {"type": "head", "text": "SH'KILLAという存在"},{"type": "text", "text": "一方のSh'killaはベイエリアの女性ギャングスタMC。Suga TやLady of Rageと並び、90年代ウェッサイの男社会で数少ない女の論客の一人だった。1996年、G.W.K. Recordsからソロ『Gangstrez From da Bay』をリリース。プロデュースはこの\"Knock on Wood\"と同じくS.C.C.のHavoc & Prodejeで、配給は当時ウェッサイ・ギャングスタの総本山だったPriority Records。大ヒットはしなかったが、ベイの硬派な空気を真空パックした一枚として今も評価される。\n\nつまりこの曲は、オークランド/Ice-T人脈のGripstaと、ベイ/G.W.K.人脈のSh'killa——出自の違う二人の女Gが、同じビートの上でタフネスを競い合った瞬間だ。その緊張感こそが\"Knock on Wood\"を特別にしている。"},{"type": "head", "text": "対訳で読む（抜粋）"}, {"type": "text", "text": "全部は載せないが、ヤマ場を抜き出して訳す。スラングの密度がとにかく濃い。"}, {"type": "lyric", "orig": "Female G's that sit, they all say we nuts", "tran": "座して構えるFemale Gたち、周りはみんな私たちを「イカれてる」と言う", "note": "\"nuts\"=イカれてる/狂ってる。女のくせに、ではなく\"女のG\"として一目置かれ恐れられている、という宣言から入る。"}, {"type": "lyric", "orig": "And if you run up to us G's for sure we'll peel your cap back", "tran": "もし私たちGに突っかかってくるなら、確実にその頭をぶち抜いてやる", "note": "\"peel your cap back\"=頭(cap)を撃ち抜く、の超定番スラング。\"run up\"=突っかかる/詰めてくる。"}, {"type": "lyric", "orig": "We on a mission (187 with your mates)", "tran": "私たちは任務中だ（お前らの連れを殺(187)るためにな）", "note": "\"187\"=カリフォルニア州刑法187条＝殺人。西海岸ラップの最重要コードの一つ。\"mates\"=仲間/連れ。"}, {"type": "lyric", "orig": "Knock on wood y'all cuz its all about us g's", "tran": "幸運を祈りな、今は私たちGが全てを握ってるんだから", "note": "\"knock on wood\"=厄除けに木を叩く慣習(縁起担ぎ)。曲名の由来。お前らはせいぜい無事を祈ってろ、という挑発に転化している。"}, {"type": "head", "text": "スラング早見"}, {"type": "text", "text": "40d / 40 = .40口径の拳銃\nthe Nine / 9mm = 9ミリ拳銃（\"when the Nine goes pop\"＝9ミリが火を噴く時）\nbust / blast = 撃つ\ncreep = 気配を消して忍び寄る\nbuster = 腰抜け/ニセモノ\nfade = 消す/やられる（\"can't fade this\"＝誰も俺たちを潰せない）\nballin' = 派手に稼ぐ/羽振りがいい\nslipping = 油断する"}, {"type": "video", "mp4": "FullSizeRender-compressed.MOV", "caption": "字幕付きクリップ"}, {"type": "text", "text": "90年代半ば、女性が銃とブロックを語ること自体が挑戦だった。Sh'killaとGripstaはそれを\"演technique\"ではなく自分の言葉でやってのけた。盛岡から聴いても、この芯の強さは時代も国境も超えて刺さる。"}] },
];

/* ════════ SAFE STORAGE ════════ */
var memStore = {};
function storeGet(k) {
  try { var v = localStorage.getItem(k); return v !== null ? v : (memStore[k] || null); }
  catch (e) { return memStore[k] || null; }
}
function storeSet(k, v) {
  memStore[k] = v;
  try { localStorage.setItem(k, v); } catch (e) {}
}

/* ════════ 019 TRACK LIST (ホーム) ════════ */
function renderPlaylist() {
  var box = document.getElementById('playlist-list');
  if (!box) return;
  // 019 Hood Music の曲（TRACKS）を表示
  box.innerHTML = TRACKS.map(function(t, i) {
    var artHtml = t.artwork ? '<img src="' + t.artwork + '" alt="">' : '🔥';
    return '<div class="pl-row" data-i="' + i + '" id="pl-row-' + i + '">' +
      '<div class="pl-num">' + (i+1) + '</div>' +
      '<div class="pl-art" id="pl-art-' + i + '">' + artHtml + '</div>' +
      '<div class="pl-meta">' +
        '<div class="pl-name">' + esc(t.name) + '</div>' +
        '<div class="pl-artist">' + esc(t.artist) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
  box.querySelectorAll('.pl-row').forEach(function(row) {
    row.addEventListener('click', function() {
      var i = parseInt(this.dataset.i, 10);
      playTrack(i);
      openSheet();
    });
  });
  // 各曲のアートワークを取得して反映
  TRACKS.forEach(function(t, i) {
    if (t.artwork) return;
    fetchArtworkOnly(t.name + ' ' + t.artist).then(function(url) {
      if (!url) return;
      t.artwork = url;
      var artBox = document.getElementById('pl-art-' + i);
      if (artBox) artBox.innerHTML = '<img src="' + url + '" alt="">';
    });
  });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var radioState = { genre:'hiphop', stations:[], cache:{}, currentUuid:null };

// iPhoneで再生しやすい局だけに絞る（HTTPS + MP3/AAC）
function radioStreamOk(s) {
  var url = s.url_resolved || s.url || '';
  if (url.indexOf('https://') !== 0) return false; // GitHub PagesはHTTPS、混在コンテンツは不可
  var codec = (s.codec || '').toUpperCase();
  if (codec && codec !== 'MP3' && codec !== 'AAC' && codec !== 'AAC+') return false;
  if (/\.m3u8($|\?)/i.test(url)) return false; // HLSは扱いが別なので除外
  if (/\.pls($|\?)|\.m3u($|\?)/i.test(url)) return false; // プレイリストファイルは除外
  return true;
}
function radioFetchStations(genreKey) {
  if (radioState.cache[genreKey]) return Promise.resolve(radioState.cache[genreKey]);
  var g = RADIO_GENRES.find(function(x){ return x.key === genreKey; });
  if (!g) return Promise.resolve([]);
  // 固定局（確実に聴ける）を先頭に
  var fixed = (g.fixed || []).map(function(s){
    return { uuid:s.uuid, name:s.name, url:s.url, country:s.country||'', favicon:s.favicon||'', bitrate:s.bitrate||0, codec:s.codec||'', votes:999999 };
  });
  var all = [];
  function searchTerm(term) {
    var url = RADIO_API + '/json/stations/search?tag=' + encodeURIComponent(term) +
              '&order=clickcount&reverse=true&hidebroken=true&limit=40';
    return fetch(url, { headers:{ 'Content-Type':'application/json' } })
      .then(function(r){ return r.ok ? r.json() : []; })
      .then(function(list){ all = all.concat(list||[]); })
      .catch(function(){});
  }
  // 局名で確実に探す（Radio ACID等）
  var byName = [];
  function searchByName(name) {
    var url = RADIO_API + '/json/stations/byname/' + encodeURIComponent(name) +
              '?order=clickcount&reverse=true&hidebroken=true&limit=5';
    return fetch(url, { headers:{ 'Content-Type':'application/json' } })
      .then(function(r){ return r.ok ? r.json() : []; })
      .then(function(list){ byName = byName.concat(list||[]); })
      .catch(function(){});
  }
  var nameSearches = (g.names || []).map(function(n){ return function(){ return searchByName(n); }; });
  var termSearches = g.terms.map(function(t){ return function(){ return searchTerm(t); }; });
  return nameSearches.concat(termSearches).reduce(function(p, fn){
    return p.then(fn);
  }, Promise.resolve()).then(function(){
    // 名前検索の結果（確実な局）を固定の次に優先表示
    var named = byName.filter(radioStreamOk).map(function(s){
      return { uuid:s.stationuuid, name:s.name||'Unknown', url:s.url_resolved||s.url,
               country:s.country||'', favicon:s.favicon||'', bitrate:s.bitrate||0, codec:s.codec||'', votes:888888 };
    });
    var clean = all.filter(radioStreamOk).map(function(s){
      return {
        uuid:s.stationuuid, name:s.name || 'Unknown',
        url:s.url_resolved || s.url,
        country:s.country || '', favicon:s.favicon || '',
        bitrate:s.bitrate || 0, codec:s.codec || '', votes:s.votes || 0
      };
    });
    clean.sort(function(a,b){ return (b.votes||0) - (a.votes||0); });
    // 固定局 + 名前検索 + タグ検索、重複名を除去
    var merged = fixed.concat(named).concat(clean);
    var seen = {}; var uniq = [];
    merged.forEach(function(s){
      var k = s.name.toLowerCase().trim();
      if (!seen[k]) { seen[k] = 1; uniq.push(s); }
    });
    radioState.cache[genreKey] = uniq.slice(0, 20);
    return radioState.cache[genreKey];
  });
}

var nowPlayingTimer = null;
function lautfmStationName(url) {
  // https://stream.laut.fm/局名 → 局名 を抜き出す
  var m = (url || '').match(/stream\.laut\.fm\/([a-z0-9_-]+)/i);
  return m ? m[1] : null;
}
function stopNowPlaying() {
  if (nowPlayingTimer) { clearInterval(nowPlayingTimer); nowPlayingTimer = null; }
}
function startNowPlaying(s) {
  stopNowPlaying();
  var station = lautfmStationName(s.url);
  if (!station) return; // laut.fm以外は対応なし（局名のまま表示）
  var applySong = function(title, artist) {
    if (!state.isRadio || radioState.currentUuid !== s.uuid) return;
    if (!title && !artist) return;
    var nowText = artist ? (artist + ' — ' + title) : title;
    setNowText(nowText, s.name);
    var pt = document.getElementById('preview-tag');
    if (pt) pt.textContent = '♪ NOW PLAYING · ' + s.name;
  };
  // 1) 公式ライブラリがあればそれを使う（CORS対応）
  if (window.laut && window.laut.fm && typeof window.laut.fm.station === 'function') {
    try {
      window.laut.fm.station(station).current_song(function(song){
        if (!song) return;
        var artist = (song.artist && song.artist.name) ? song.artist.name : '';
        applySong(song.title || '', artist);
      }, true); // true = 自動更新
      return;
    } catch (e) {}
  }
  // 2) フォールバック：素のfetch（CORSが通れば動く）
  var fetchNow = function() {
    if (!state.isRadio || radioState.currentUuid !== s.uuid) { stopNowPlaying(); return; }
    fetch('https://api.laut.fm/station/' + encodeURIComponent(station) + '/current_song')
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(song){
        if (!song) return;
        var artist = (song.artist && song.artist.name) ? song.artist.name : '';
        applySong(song.title || '', artist);
      })
      .catch(function(){});
  };
  fetchNow();
  nowPlayingTimer = setInterval(fetchNow, 30000); // 30秒ごとに更新
}

var jsonpCounter = 0;
function jsonp(buildUrl, timeoutMs) {
  return new Promise(function(resolve) {
    var cbName = '__cb' + (++jsonpCounter) + '_' + Date.now();
    var script = document.createElement('script');
    var done = false;
    var timer = setTimeout(function(){ finish(null, 'タイムアウト'); }, timeoutMs || 8000);
    function finish(data, err) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve({ data: data, err: err || null });
    }
    window[cbName] = function(data){ finish(data, null); };
    script.onerror = function(){ finish(null, '通信エラー'); };
    script.src = buildUrl(cbName);
    document.head.appendChild(script);
  });
}
function searchDeezer(term) {
  return jsonp(function(cb) {
    return 'https://api.deezer.com/search?q=' + encodeURIComponent(term) +
      '&output=jsonp&callback=' + cb;
  });
}
function fetchTrackInfo(i) {
  var t = TRACKS[i];
  if (t.preview) return Promise.resolve(t);
  var term = t.artist + ' ' + t.name;
  var diag = [];
  function fetchJson(url, ms) {
    return new Promise(function(resolve) {
      var done = false;
      var timer = setTimeout(function(){ if(!done){done=true;resolve({data:null,err:'タイムアウト'});} }, ms||8000);
      fetch(url).then(function(r){
        if (!r.ok) throw new Error('HTTP' + r.status);
        return r.json();
      }).then(function(j){
        if(!done){done=true;clearTimeout(timer);resolve({data:j,err:null});}
      }).catch(function(e){
        if(!done){done=true;clearTimeout(timer);resolve({data:null,err:(e&&e.message)||'エラー'});}
      });
    });
  }
  function takeDeezer(r, label) {
    var hit = r.data && (r.data.data || []).find(function(x){ return x.preview; });
    if (hit) {
      t.preview = hit.preview;
      t.artwork = (hit.album && (hit.album.cover_big || hit.album.cover_medium)) || '';
      t.source = 'Deezer';
      return true;
    }
    diag.push(label + ':' + (r.err || '0件'));
    return false;
  }
  return fetchJson('https://api.deezer.com/search?q=' + encodeURIComponent(term)).then(function(r) {
    if (takeDeezer(r, 'Deezer直')) return t;
    return searchDeezer(term).then(function(r2) {
      if (takeDeezer(r2, 'Deezer別')) return t;
      return fetchJson('https://itunes.apple.com/search?term=' + encodeURIComponent(term) +
        '&media=music&entity=song&limit=5&country=JP').then(function(r3) {
        var hit = r3.data && (r3.data.results || []).find(function(x){ return x.previewUrl; });
        if (hit) {
          t.preview = hit.previewUrl;
          t.artwork = (hit.artworkUrl100 || '').replace('100x100', '400x400');
          t.source = 'Apple Music';
          return t;
        }
        diag.push('Apple:' + (r3.err || '0件'));
        t.diag = diag.join(' / ');
        return t;
      });
    });
  });
}

function buildBlock(b) {
  var el = document.createElement('div');
  if (b.type === 'text') {
    el.className = 'dd-text';
    el.textContent = b.text;
  } else if (b.type === 'head') {
    el.className = 'dd-head';
    el.textContent = b.text;
  } else if (b.type === 'image') {
    el.className = 'dd-image';
    var img = document.createElement('img');
    img.src = b.src; img.alt = b.alt || ''; img.loading = 'lazy';
    el.appendChild(img);
    if (b.caption) {
      var cap = document.createElement('div');
      cap.className = 'dd-caption'; cap.textContent = b.caption;
      el.appendChild(cap);
    }
  } else if (b.type === 'video') {
    el.className = 'dd-video';
    if (b.youtube) {
      var ifr = document.createElement('iframe');
      ifr.src = 'https://www.youtube.com/embed/' + b.youtube;
      ifr.allow = 'accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      ifr.allowFullscreen = true;
      ifr.frameBorder = '0';
      el.appendChild(ifr);
    } else if (b.mp4) {
      var vid = document.createElement('video');
      vid.controls = true; vid.playsInline = true; vid.preload = 'metadata';
      var src = document.createElement('source');
      src.src = b.mp4;
      // 拡張子に応じてtypeを指定（MOVはquicktime）
      var low = b.mp4.toLowerCase();
      if (low.indexOf('.mov') > -1) src.type = 'video/quicktime';
      else src.type = 'video/mp4';
      vid.appendChild(src);
      // フォールバックで直接srcも
      vid.src = b.mp4;
      el.appendChild(vid);
    }
    if (b.caption) {
      var vcap = document.createElement('div');
      vcap.className = 'dd-caption'; vcap.textContent = b.caption;
      el.appendChild(vcap);
    }
  } else if (b.type === 'lyric') {
    el.className = 'dd-lyric';
    var orig = document.createElement('div');
    orig.className = 'dd-lyric-orig'; orig.textContent = b.orig;
    var tran = document.createElement('div');
    tran.className = 'dd-lyric-tran'; tran.textContent = b.tran;
    el.appendChild(orig); el.appendChild(tran);
    if (b.note) {
      var note = document.createElement('div');
      note.className = 'dd-lyric-note'; note.textContent = b.note;
      el.appendChild(note);
    }
  }
  return el;
}

  return new Promise(function(resolve) {
    var done = false;
    var timer = setTimeout(function(){ if(!done){done=true;resolve(null);} }, 8000);
    fetch('https://api.deezer.com/search?q=' + encodeURIComponent(term)).then(function(r){
      return r.json();
    }).then(function(j){
      if (done) return;
      done = true; clearTimeout(timer);
      var hit = j && (j.data || []).find(function(x){ return x.album && (x.album.cover_big || x.album.cover_medium); });
      resolve(hit ? (hit.album.cover_big || hit.album.cover_medium) : null);
    }).catch(function(){
      if (done) return;
      done = true; clearTimeout(timer);
      // JSONP fallback
      searchDeezer(term).then(function(res){
        var hit = res.data && (res.data.data || []).find(function(x){ return x.album && (x.album.cover_big || x.album.cover_medium); });
        resolve(hit ? (hit.album.cover_big || hit.album.cover_medium) : null);
      });
    });
  });
}
function renderSearchList() {
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  var list = document.getElementById('search-list');
  if (!q) {
    list.innerHTML = '<div class="empty-msg">曲名やアーティスト名を入力してください<br>例：「funk」「dre」「soul」</div>';
    return;
  }
  var idx = TRACKS.map(function(t,i){ return i; })
    .filter(function(i){
      var t = TRACKS[i];
      return t.name.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q) || t.tag.toLowerCase().includes(q);
    });
  if (!idx.length) {
    list.innerHTML = '<div class="empty-msg">「' + q + '」に一致する曲が見つかりませんでした</div>';
    return;
  }
  list.innerHTML = idx.map(rowHTML).join('');
  wireRows(list);
}
function renderQueue() {
  // ラジオ再生中は019のUp NextとSpotifyボタンを隠す
  var qSection = document.getElementById('q-section');
  var spotifyWrap = document.getElementById('spotify-wrap');
  var show = !state.isRadio;
  if (qSection) qSection.style.display = show ? '' : 'none';
  if (spotifyWrap) spotifyWrap.style.display = show ? '' : 'none';
  if (!show) return;
  var list = document.getElementById('queue-list');
  list.innerHTML = TRACKS.map(function(t, i) {
    var isNow = i === state.currentIdx;
    return '<div class="q-row' + (isNow ? ' now' : '') + '" data-i="' + i + '">' +
      '<div class="q-num">' + (isNow ? '♪' : (i+1)) + '</div>' +
      '<div class="qr-info"><div class="qr-name">' + esc(t.name) + '</div><div class="qr-artist">' + esc(t.artist) + '</div></div>' +
      '<div class="qr-dur">0:30</div>' +
    '</div>';
  }).join('');
  list.querySelectorAll('.q-row').forEach(function(row) {
    row.addEventListener('click', function(){ playTrack(parseInt(this.dataset.i, 10)); });
  });
}
function renderAll() {
  renderQueue();
  if (document.getElementById('search-input').value.trim()) renderSearchList();
}
function renderNowPlaying() {
  if (state.currentIdx < 0) return;
  var t = TRACKS[state.currentIdx];
  setNowText(t.name, t.artist);
  setMiniArt(t.artwork, t.icon, t.color);
  setCover(t.artwork, t.tag.toUpperCase());
  var station = document.getElementById('sheet-station');
  if (station) station.textContent = t.tag.toUpperCase() + ' CHANNEL';
  var pt = document.getElementById('preview-tag');
  if (pt) pt.textContent = t.preview ? '30秒プレビュー · ' + (t.source || 'Apple Music') + '提供' : '';
  renderFavBtn();
  renderAll();
}
function renderFavBtn() {
  var btn = document.getElementById('b-fav');
  var isFav = state.currentIdx >= 0 && state.favs.has(state.currentIdx);
  var fill = isFav ? 'currentColor' : 'none';
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="' + fill + '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>';
  btn.classList.toggle('on', isFav);
}
var SVG_PLAY = '<svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
var SVG_PAUSE = '<svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/></svg>';
var SVG_PLAY_MINI = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
var SVG_PAUSE_MINI = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/></svg>';
function renderPlayState() {
  document.getElementById('b-play').innerHTML = state.playing ? SVG_PAUSE : SVG_PLAY;
  var mini = document.getElementById('mini-play');
  if (mini) mini.innerHTML = state.playing ? SVG_PAUSE_MINI : SVG_PLAY_MINI;
  ['sheet-info-wrap','search-list'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('playing-anim', state.playing);
  });
}

/* ════════ PLAYBACK ════════ */
function playTrack(idx) {
  state.isRadio = false;
  radioState.currentUuid = null;
  stopNowPlaying();
  state.currentIdx = idx;
  state.loading = true;
  renderNowPlaying(); renderPlayState(); renderQueue();
  fetchTrackInfo(idx).then(function(t) {
    if (state.currentIdx !== idx) return;
    state.loading = false;
    if (t.preview) {
      audio.src = t.preview;
      audio.volume = 1.0;
      audio.play().then(function() {
        state.playing = true;
        renderNowPlaying(); renderPlayState();
      }).catch(function(err) {
        state.playing = false;
        document.getElementById('preview-tag').textContent = '再生がブロックされました。▶をもう一度押してください';
        renderPlayState();
      });
    } else {
      state.playing = false;
      document.getElementById('preview-tag').textContent = '取得失敗 [' + (t.diag || '原因不明') + '] ▶で再試行';
      renderPlayState();
    }
  });
}
function togglePlay() {
  // ラジオ再生中はストリームを一時停止/再開するだけ（019に切り替えない）
  if (state.isRadio) {
    if (audio.paused) {
      audio.play().then(function(){ state.playing = true; renderPlayState(); }).catch(function(){});
    } else {
      audio.pause();
      state.playing = false;
      renderPlayState();
    }
    return;
  }
  if (state.currentIdx < 0) { playTrack(0); return; }
  var t = TRACKS[state.currentIdx];
  if (!t.preview) { playTrack(state.currentIdx); return; }
  if (audio.paused) {
    audio.play().catch(function(){});
  } else {
    audio.pause();
  }
}
function toggleFav(i) {
  if (state.favs.has(i)) state.favs.delete(i);
  else state.favs.add(i);
  saveFavs();
  renderFavBtn();
  renderAll();
}
function getPool() {
  return TRACKS.map(function(t, i){ return i; });
}
function nextTrack() {
  // ラジオ再生中は「次の局」へ（019に切り替わらない）
  if (state.isRadio) { radioSkip(1); return; }
  var pool = getPool();
  if (!pool.length) return;
  var next;
  if (state.shuffle) next = pool[Math.floor(Math.random() * pool.length)];
  else {
    var pos = pool.indexOf(state.currentIdx);
    next = pool[(pos + 1) % pool.length];
  }
  playTrack(next);
}
function prevTrack() {
  // ラジオ再生中は「前の局」へ
  if (state.isRadio) { radioSkip(-1); return; }
  var pool = getPool();
  if (!pool.length) return;
  if (audio.currentTime > 4) { audio.currentTime = 0; return; }
  var pos = pool.indexOf(state.currentIdx);
  playTrack(pool[(pos - 1 + pool.length) % pool.length]);
}
// ラジオ局スキップ（現在のジャンルのリスト内で移動）
function radioSkip(dir) {
  var list = radioState.stations || [];
  if (!list.length) return;
  var cur = -1;
  for (var i = 0; i < list.length; i++) {
    if (list[i].uuid === radioState.currentUuid) { cur = i; break; }
  }
  if (cur < 0) cur = 0;
  var nextIdx = (cur + dir + list.length) % list.length;
  playRadio(nextIdx);
}

/* ════════ NAV / PAGE ════════ */
function switchPage(page) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var pg = document.getElementById('page-' + page);
  if (pg) pg.classList.add('active');
  var btn = document.querySelector('.nav-btn[data-page="' + page + '"]');
  if (btn) btn.classList.add('active');
  document.querySelector('.content').scrollTop = 0;
  if (pg) pg.scrollTop = 0;
  if (page === 'deepdive') renderDeepDive();
}
/* ════════ UI WIRING ════════ */
function openSheet()  { document.getElementById('sheet').classList.add('open'); }
function closeSheet() {
  var s = document.getElementById('sheet');
  s.classList.remove('open');
  s.style.transform = ''; s.style.transition = '';
}
document.getElementById('sheet-close').addEventListener('click', closeSheet);
document.getElementById('drag-bar').addEventListener('click', closeSheet);
document.getElementById('mini').addEventListener('click', function(e) {
  if (e.target.id !== 'mini-play') openSheet();
});
(function() {
  var sheet = document.getElementById('sheet');
  var startY = 0;
  sheet.addEventListener('touchstart', function(e){ startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchmove', function(e) {
    var dy = e.touches[0].clientY - startY;
    if (dy > 0 && sheet.scrollTop <= 0) {
      sheet.style.transform = 'translateY(' + dy + 'px)';
      sheet.style.transition = 'none';
    }
  }, { passive: true });
  sheet.addEventListener('touchend', function(e) {
    var dy = e.changedTouches[0].clientY - startY;
    sheet.style.transition = ''; sheet.style.transform = '';
    if (dy > 110 && sheet.scrollTop <= 0) closeSheet();
  });
})();

document.getElementById('b-play').addEventListener('click', togglePlay);
document.getElementById('mini-play').addEventListener('click', function(e){ e.stopPropagation(); togglePlay(); });
document.getElementById('b-prev').addEventListener('click', prevTrack);
document.getElementById('b-next').addEventListener('click', nextTrack);
document.getElementById('b-shuffle').addEventListener('click', function() {
  state.shuffle = !state.shuffle;
  this.classList.toggle('on', state.shuffle);
});
document.getElementById('b-fav').addEventListener('click', function() {
  if (state.currentIdx >= 0) toggleFav(state.currentIdx);
});

document.getElementById('b-spotify').addEventListener('click', function() {
  var t = (state.currentIdx >= 0) ? TRACKS[state.currentIdx] : null;
  // 曲に個別URLがあればそれを優先（1発でその曲へ）
  if (t && t.spotify) {
    window.open(t.spotify, '_blank');
    return;
  }
  // なければ Kg za Horchata のアーティストページへ直行
  window.open('https://open.spotify.com/artist/5PEuv4EXwaXy1tMB84lefP', '_blank');
});

function seekFromEvent(e) {
  if (!audio.duration) return;
  var bar = document.getElementById('prog-bar');
  var rect = bar.getBoundingClientRect();
  var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  audio.currentTime = Math.max(0, Math.min(1, x / rect.width)) * audio.duration;
  renderProgress();
}
document.getElementById('prog-bar').addEventListener('click', seekFromEvent);
document.getElementById('prog-bar').addEventListener('touchstart', seekFromEvent, { passive: true });

// 音量バーは撤去（iPhoneは端末の物理ボタンで音量調整）
audio.volume = 1.0;

document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
  btn.addEventListener('click', function() { switchPage(this.dataset.page); });
});
document.getElementById('search-input').addEventListener('input', renderSearchList);

// 記事モーダルを閉じる（要素があれば）
var colClose = document.getElementById('col-sheet-close');
if (colClose) colClose.addEventListener('click', closeColumn);
var colModal = document.getElementById('col-modal');
if (colModal) colModal.addEventListener('click', function(e) {
  if (e.target.id === 'col-modal') closeColumn();
});

/* ════════ INIT ════════ */
renderPlaylist();
renderRadioGenres();
loadRadioGenre();
renderDeepDive();
renderSearchList();
renderQueue();
</script>
