<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROOVE 通信診断</title>
<style>
body { background:#0A0A0F; color:#F0EBE0; font-family:-apple-system,sans-serif; padding:20px; }
h1 { color:#C8A84B; font-size:20px; }
button { width:100%; padding:16px; background:#C8A84B; border:none; border-radius:12px; font-size:16px; font-weight:bold; margin:16px 0; }
#log { font-size:13px; line-height:1.9; word-break:break-all; }
.ok { color:#4CAF50; }
.ng { color:#FF5252; }
audio { width:100%; margin-top:16px; }
</style>
</head>
<body>
<h1>GROOVE 通信診断ページ</h1>
<p style="font-size:13px;color:#888">下のボタンを押すと、あなたのスマホからどの音楽データが取得できるかをテストして結果を表示します。</p>
<button id="go">診断スタート</button>
<div id="log"></div>
<div id="player"></div>

<script>
'use strict';
var log = document.getElementById('log');
function line(msg, ok) {
  var d = document.createElement('div');
  d.className = ok === true ? 'ok' : (ok === false ? 'ng' : '');
  d.textContent = msg;
  log.appendChild(d);
}

function fetchJson(url, ms) {
  return new Promise(function(resolve) {
    var done = false;
    var timer = setTimeout(function(){ if(!done){done=true;resolve({err:'タイムアウト'});} }, ms||8000);
    fetch(url).then(function(r){
      if (!r.ok) throw new Error('HTTP' + r.status);
      return r.json();
    }).then(function(j){
      if(!done){done=true;clearTimeout(timer);resolve({data:j});}
    }).catch(function(e){
      if(!done){done=true;clearTimeout(timer);resolve({err:(e&&e.message)||'エラー'});}
    });
  });
}

function jsonpTest(url, ms) {
  return new Promise(function(resolve) {
    var cb = '__diag' + Date.now();
    var s = document.createElement('script');
    var done = false;
    var timer = setTimeout(function(){ fin({err:'タイムアウト'}); }, ms||8000);
    function fin(r) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) {}
      if (s.parentNode) s.parentNode.removeChild(s);
      resolve(r);
    }
    window[cb] = function(d){ fin({data:d}); };
    s.onerror = function(){ fin({err:'scriptエラー'}); };
    s.src = url + cb;
    document.head.appendChild(s);
  });
}

document.getElementById('go').addEventListener('click', function() {
  log.innerHTML = '';
  document.getElementById('player').innerHTML = '';
  line('=== 診断開始 ' + new Date().toLocaleTimeString() + ' ===');
  line('ブラウザ: ' + navigator.userAgent.slice(0, 80));
  var term = encodeURIComponent('Marvin Gaye Whats Going On');
  var preview = null, source = '';

  // テスト1: Deezer fetch
  fetchJson('https://api.deezer.com/search?q=' + term).then(function(r) {
    if (r.data && r.data.data && r.data.data.length && r.data.data[0].preview) {
      line('① Deezer直接取得: 成功 (' + r.data.data.length + '件)', true);
      if (!preview) { preview = r.data.data[0].preview; source = 'Deezer直'; }
    } else {
      line('① Deezer直接取得: 失敗 [' + (r.err || 'データなし') + ']', false);
    }
    // テスト2: Deezer JSONP
    return jsonpTest('https://api.deezer.com/search?q=' + term + '&output=jsonp&callback=');
  }).then(function(r) {
    if (r.data && r.data.data && r.data.data.length && r.data.data[0].preview) {
      line('② Deezerスクリプト取得: 成功', true);
      if (!preview) { preview = r.data.data[0].preview; source = 'Deezerスクリプト'; }
    } else {
      line('② Deezerスクリプト取得: 失敗 [' + (r.err || 'データなし') + ']', false);
    }
    // テスト3: Apple fetch
    return fetchJson('https://itunes.apple.com/search?term=' + term + '&media=music&limit=3&country=JP');
  }).then(function(r) {
    if (r.data && r.data.results && r.data.results.length && r.data.results[0].previewUrl) {
      line('③ Apple直接取得: 成功 (' + r.data.results.length + '件)', true);
      if (!preview) { preview = r.data.results[0].previewUrl; source = 'Apple'; }
    } else {
      line('③ Apple直接取得: 失敗 [' + (r.err || 'データなし') + ']', false);
    }
    line('=== 診断終了 ===');
    if (preview) {
      line('🎵 ' + source + ' から音源を取得できました!下の再生ボタンを押してください:', true);
      var p = document.getElementById('player');
      var a = document.createElement('audio');
      a.controls = true;
      a.src = preview;
      p.appendChild(a);
    } else {
      line('⚠ どのルートからも音源を取得できませんでした。この画面のスクショを送ってください。', false);
    }
  });
});
</script>
</body>
</html>
